<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ดูคะแนนรายห้อง</title>
<link rel="stylesheet" href="style.css">

<style>

body.page-admin-score{
background: linear-gradient(135deg,#cfe9ff,#fde2f3,#d1fae5);
min-height:100vh;
font-family: system-ui,-apple-system,"Segoe UI",sans-serif;
}

.wrap{
background: rgba(255,255,255,.94);
border-radius:28px;
padding:26px 28px 36px;
box-shadow:0 30px 80px rgba(15,23,42,.18);
max-width:1200px;
margin:40px auto;
}

/* HEADER */

.pageHead{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:18px;
}

.pageTitle{
font-size:20px;
font-weight:1000;
color:#0f172a;
}

/* BACK BUTTON */

.backBtn{
display:flex;
align-items:center;
gap:12px;
padding:10px 14px;
border-radius:22px;
background:#fff;
border:1px solid #e2e8f0;
box-shadow:0 14px 40px rgba(15,23,42,.18);
text-decoration:none;
color:#0f172a;
}

.backIcon{
width:38px;
height:38px;
border-radius:14px;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#60a5fa,#818cf8);
color:#fff;
}

/* FILTER */

.grid4{
display:grid;
grid-template-columns: repeat(auto-fit,minmax(160px,1fr));
gap:12px;
margin-bottom:18px;
}

select{
border-radius:18px;
padding:12px 14px;
border:1px solid #e2e8f0;
background:#fff;
font-weight:900;
}

button{
border:none;
border-radius:18px;
padding:12px 16px;
font-weight:1000;
cursor:pointer;
background:linear-gradient(135deg,#3b82f6,#6366f1);
color:#fff;
}

.btn-green{
background:linear-gradient(135deg,#22c55e,#4ade80);
}

.btn-pdf{
background:linear-gradient(135deg,#ef4444,#f97316);
}

/* PRINT HEADER */

#printHeader{
display:none;
text-align:center;
margin-bottom:10px;
}

#printHeader .school{
font-size:22px;
font-weight:bold;
}

#printHeader .title{
font-size:18px;
margin-top:3px;
}

#printHeader .info{
display:flex;
justify-content:space-between;
margin-top:6px;
font-size:16px;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

th,td{
border:1px solid #333;
padding:4px;
text-align:center;
}

/* ชื่อนักเรียน */

td:nth-child(2){
text-align:left;
padding-left:10px;
}

/* RESULT */

#result{
margin-top:18px;
overflow:auto;
}

/* SIGNATURE */

.signatureBox{
margin-top:30px;
display:flex;
justify-content:flex-end;
}

.signatureCard{
width:300px;
text-align:center;
}

.signatureLine{
margin:30px 0 8px;
border-bottom:2px solid #333;
}

/* PRINT */

@media print{

@page{
size:A4 landscape;
margin:12mm;
}

body{
background:#fff;
}

.pageHead,
.grid4,
.backBtn{
display:none;
}

#printHeader{
display:block;
}

.wrap{
box-shadow:none;
margin:0;
border-radius:0;
padding:0;
}

}

</style>
</head>

<body class="page-admin-score">

<div class="wrap">

<div class="pageHead">

<div class="pageTitle">
📊 ดูคะแนนรายห้อง
</div>

<a href="admin.html" class="backBtn">
<div class="backIcon">⬅</div>
<b>กลับหน้า Admin</b>
</a>

</div>

<div class="grid4">

<select id="level">
<option>P2</option>
<option>P3</option>
<option>P4</option>
<option>P5</option>
<option>P6</option>
<option>M1</option>
<option>M2</option>
<option>M3</option>
</select>

<select id="room"></select>

<select id="term">
<option value="1">เทอม 1</option>
<option value="2">เทอม 2</option>
</select>

<button onclick="loadRoomScore()">ดูคะแนน</button>

<button onclick="exportPP5()" class="btn-green">
📄 สร้าง ปพ.5
</button>

<button onclick="exportPDF()" class="btn-pdf">
⬇️ PDF
</button>

</div>

<div id="printHeader">

<div class="school">
โรงเรียนอนุบาลพร้อมจิต
</div>

<div class="title">
รายงานผลการเรียนรายวิชา
</div>

<div class="info">

<div id="printSubject">
รายวิชา : คอมพิวเตอร์
</div>

<div id="printClass"></div>

</div>

</div>

<div id="result"></div>

<div class="signatureBox">

<div class="signatureCard">

<div class="signatureLine"></div>

<b>ว่าที่ ร.ต. บุญญฤทธิ์ ศรีนาค</b>

<div>ครูประจำวิชา</div>

</div>

</div>

</div>

<script src="admin-view-score.js"></script>

<script>

function convertLevel(level){

if(level==="M1") return "มัธยมศึกษาปีที่ 1"
if(level==="M2") return "มัธยมศึกษาปีที่ 2"
if(level==="M3") return "มัธยมศึกษาปีที่ 3"

if(level==="P1") return "ประถมศึกษาปีที่ 1"
if(level==="P2") return "ประถมศึกษาปีที่ 2"
if(level==="P3") return "ประถมศึกษาปีที่ 3"
if(level==="P4") return "ประถมศึกษาปีที่ 4"
if(level==="P5") return "ประถมศึกษาปีที่ 5"
if(level==="P6") return "ประถมศึกษาปีที่ 6"

return level
}

function exportPDF(){

const level=document.getElementById("level").value
const room=document.getElementById("room").value

const levelText=convertLevel(level)

document.getElementById("printClass").innerText=
"ชั้น "+levelText+" ห้อง "+room

window.print()

}

</script>

</body>
</html>
